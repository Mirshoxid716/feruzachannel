<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Profilim - Feruza Channel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #eee;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .profile-info h2 {
            margin-bottom: 0.5rem;
            color: var(--dark-blue);
        }

        .profile-info p {
            color: #666;
            font-size: 1.1rem;
        }

        .profile-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>Feruza Channel</h1>
        <nav style="margin-top: 1.5rem;">
            <ul>
                <li><a href="index.html">Bosh sahifa</a></li>
                <li><a href="courses.html">Darslar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="profile-container animate" id="profile-content">
            <div class="profile-header">
                <div class="profile-info">
                    <h2 id="prof-name">Yuklanmoqda...</h2>
                    <p id="prof-email">...</p>
                </div>
                <div>
                    <button class="btn btn-outline" style="border-color: red; color: red;" onclick="logout()">Tizimdan
                        chiqish</button>
                </div>
            </div>

            <div class="profile-body">
                <h3>Xush kelibsiz!</h3>
                <p style="margin-top: 1rem; line-height: 1.6;">
                    Bu sizning shaxsiy kabinetingiz. Endi istalgan darsni ko'rib, uning PDF materialini o'z emailingizga
                    bitta tugma orqali bepul yuborishingiz mumkin.
                </p>
            </div>

            <div class="profile-actions">
                <a href="courses.html" class="btn btn-primary">Darslarni ko'rish</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Feruza Channel.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (requireAuth()) {
                const user = getUserInfo();
                if (user) {
                    document.getElementById('prof-name').innerText = user.full_name;
                    document.getElementById('prof-email').innerText = user.email;
                }
            }
        });
    </script>
</body>

</html>
