<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>

<script>
    // ======= CONFIG =======
    const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_URL : 'http://localhost:5000/api';
    const FILE_BASE = window.APP_CONFIG ? window.APP_CONFIG.BASE_URL : 'http://localhost:5000';

    // ======= STATE =======
    let selectedRating = 0;
    let lessonId = null;

    // ======= INIT =======
    document.addEventListener('DOMContentLoaded', () => {
        // Auth tekshiradi (sizda auth.js da bor)
        if (!requireAuth()) return;

        lessonId = new URLSearchParams(window.location.search).get('id');

        if (!lessonId) {
            showError('Dars topilmadi', "Iltimos, darslar ro'yxatidan darsni tanlab kiring. URL: lesson.html?id=123");
            return;
        }

        // Darsni yuklash
        fetchLessonDetails(lessonId).then(() => {
            // action cardni ko‘rsatish
            document.getElementById('auth-actions').style.display = 'block';

            // PDF Email tugmasi
            document.getElementById('send-pdf-btn').addEventListener('click', () => sendPdfToEmail(lessonId));

            // Rating sectionni yoqish
            document.getElementById('rating-section').style.display = 'block';
            initRatingUI();
            loadRatings(lessonId);
        });
    });

    // ======= HELPERS =======
    function showError(title, message) {
        document.getElementById('lesson-title').innerText = title;
        document.getElementById('lesson-desc').innerHTML = `<p style="color: red;">${message}</p>`;
        console.error(title, message);
    }

    function getEmbedUrl(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[2] && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
    }

    function escapeHtml(s = '') {
        return String(s).replace(/[&<>"']/g, (m) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[m]));
    }

    // ======= LESSON DETAILS =======
    async function fetchLessonDetails(id) {
        try {
            const token = getAuthToken();

            const response = await fetch(`${API_BASE}/lessons/${id}`, {
                headers: token ? { 'Authorization': `Bearer ${token}` } : {}
            });

            if (!response.ok) {
                if (response.status === 404) throw new Error('Dars topilmadi (404).');
                if (response.status === 401) throw new Error('Login qiling (401). Token yaroqsiz bo‘lishi mumkin.');
                if (response.status === 403) throw new Error('Ruxsat yo‘q (403).');
                throw new Error(`Server xatosi: ${response.status}`);
            }

            const lesson = await response.json();
            console.log("LESSON JSON:", lesson);

            // UI: title & desc
            document.getElementById('lesson-title').innerText = lesson.title || 'Nomsiz dars';
            document.title = `${lesson.title || 'Dars'} - Feruza Channel`;
            document.getElementById('lesson-desc').innerText =
                lesson.description || "Ushbu dars uchun qo'shimcha ta'rif kiritilmagan.";

            // Meta
            const metaContainer = document.getElementById('lesson-meta');
            metaContainer.innerHTML = '';
            if (lesson.category) metaContainer.innerHTML += `<span style="color:#e63946;">${escapeHtml(lesson.category)}</span>`;
            if (lesson.duration) metaContainer.innerHTML += `<span>⏱ ${escapeHtml(lesson.duration)}</span>`;
            if (lesson.created_at) metaContainer.innerHTML += `<span>📅 ${new Date(lesson.created_at).toLocaleDateString()}</span>`;

            // Video
            const videoArea = document.getElementById('video-area');
            videoArea.innerHTML = '';
            videoArea.style.display = 'none';

            if (lesson.youtube_url) {
                const embedUrl = getEmbedUrl(lesson.youtube_url);
                if (embedUrl) {
                    videoArea.innerHTML = `
            <iframe
              src="${embedUrl}"
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>`;
                    videoArea.style.display = 'block';
                } else {
                    console.warn("YouTube URL noto‘g‘ri:", lesson.youtube_url);
                }
            } else if (lesson.video_path) {
                const formattedPath = String(lesson.video_path).replace(/\\/g, '/');
                const videoUrl = `${FILE_BASE}/${formattedPath}`;
                console.log("VIDEO URL:", videoUrl);

                videoArea.innerHTML = `
          <video id="native-player" controls controlsList="nodownload"
                 style="width: 100%; height: 100%; display:block; background:#000;">
            <source src="${videoUrl}" type="video/mp4">
            Sizning brauzeringiz videoni qo'llab-quvvatlamaydi.
          </video>`;
                videoArea.style.display = 'block';

                const player = document.getElementById('native-player');
                if (player) player.load();
            }

            // PDF
            // Eslatma: DB'da file_path nisbiy bo‘lishi kerak: uploads/xxx.pdf
            if (lesson.file_path) {
                const formattedFilePath = String(lesson.file_path).replace(/\\/g, '/');
                const pdfUrl = `${FILE_BASE}/${formattedFilePath}`;
                console.log("PDF URL:", pdfUrl);

                // Oldingi pdf section bo‘lsa, duplicate bo‘lmasin
                const old = document.getElementById('pdf-section');
                if (old) old.remove();

                const mainColumn = document.querySelector('.main-column');
                const pdfSection = document.createElement('div');
                pdfSection.className = 'lesson-content animate';
                pdfSection.id = 'pdf-section';
                pdfSection.style.marginTop = '1.5rem';
                pdfSection.innerHTML = `
          <h3 style="margin-bottom: 1rem;">📄 Dars Materiali (PDF)</h3>
          <div style="width: 100%; height: 600px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0;">
            <iframe src="${pdfUrl}#toolbar=0" width="100%" height="100%" style="border:none;"></iframe>
          </div>
          <div style="margin-top: 1rem; text-align: right;">
            <a href="${pdfUrl}" target="_blank"
               style="text-decoration:none; display:inline-block; padding:0.5rem 1rem; border-radius:8px; background:#4F46E5; color:#fff; font-weight:600;">
              To'liq oynada ochish
            </a>
          </div>
          <div style="margin-top:0.75rem; font-size:0.85rem; color:#64748b;">
            Agar PDF ochilmasa: Network’da PDF request 404/403 chiqmayaptimi tekshiring.
          </div>
        `;
                mainColumn.appendChild(pdfSection);
            } else {
                console.warn("Bu darsda file_path yo‘q (PDF biriktirilmagan).");
            }

        } catch (error) {
            showError('Xatolik', error.message);
        }
    }

    // ======= SEND PDF TO EMAIL =======
    async function sendPdfToEmail(lessonId) {
        const status = document.getElementById('request-status');
        const btn = document.getElementById('send-pdf-btn');
        const token = getAuthToken();

        status.innerText = "Yuborilmoqda...";
        status.style.color = 'blue';
        btn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/lessons/${lessonId}/send-to-email`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });

            const result = await response.json().catch(() => ({}));

            if (response.ok) {
                status.style.color = 'green';
                status.innerText = result.message || "Muvaffaqiyatli jo'natildi!";
            } else {
                status.style.color = 'red';
                status.innerText = result.error || `Xato: ${response.status}`;
                if (response.status === 401) setTimeout(() => { logout(); }, 1500);
            }
        } catch (error) {
            status.style.color = 'red';
            status.innerText = "Serverga bog'lanishda xatolik.";
        } finally {
            btn.disabled = false;
        }
    }

    // ======= RATING UI =======
    function initRatingUI() {
        // star hover/click
        document.querySelectorAll('#star-rating .star').forEach(star => {
            star.addEventListener('click', function () {
                selectedRating = parseInt(this.dataset.value);
                updateStars(selectedRating);
            });
            star.addEventListener('mouseenter', function () {
                updateStars(parseInt(this.dataset.value));
            });
        });

        document.getElementById('star-rating').addEventListener('mouseleave', () => {
            updateStars(selectedRating);
        });
    }

    function updateStars(value) {
        document.querySelectorAll('#star-rating .star').forEach(star => {
            const v = parseInt(star.dataset.value);
            if (v <= value) {
                star.classList.add('active');
                star.textContent = '★';
            } else {
                star.classList.remove('active');
                star.textContent = '☆';
            }
        });
    }

    async function submitRating() {
        if (!selectedRating) {
            const msg = document.getElementById('rating-msg');
            msg.innerText = 'Iltimos yulduzcha tanlang!';
            msg.style.color = 'red';
            return;
        }

        const token = getAuthToken();
        if (!token) {
            const msg = document.getElementById('rating-msg');
            msg.innerText = 'Tizimga kiring';
            msg.style.color = 'red';
            return;
        }

        const comment = document.getElementById('rating-comment').value;
        const msg = document.getElementById('rating-msg');
        msg.innerText = 'Saqlanmoqda...';
        msg.style.color = 'blue';

        try {
            const res = await fetch(`${API_BASE}/lessons/${lessonId}/rate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ rating: selectedRating, comment })
            });

            const data = await res.json().catch(() => ({}));

            if (res.ok) {
                msg.innerText = '✅ Reyting saqlandi!';
                msg.style.color = 'green';
                document.getElementById('rating-comment').value = '';
                loadRatings(lessonId);
            } else {
                msg.innerText = data.error || `Xatolik: ${res.status}`;
                msg.style.color = 'red';
            }
        } catch (e) {
            msg.innerText = 'Server xatosi';
            msg.style.color = 'red';
        }
    }

    async function loadRatings(lessonId) {
        try {
            const res = await fetch(`${API_BASE}/lessons/${lessonId}/ratings`);
            if (!res.ok) return;

            const data = await res.json();

            // Avg
            if (data.total > 0) {
                document.getElementById('rating-avg').style.display = 'flex';
                document.getElementById('avg-rating-num').innerText = data.average;

                let stars = '';
                for (let i = 1; i <= 5; i++) stars += i <= Math.round(data.average) ? '⭐' : '☆';
                document.getElementById('avg-rating-stars').innerText = stars;
                document.getElementById('avg-rating-count').innerText = `(${data.total} ta baho)`;
            } else {
                document.getElementById('rating-avg').style.display = 'none';
            }

            // Reviews
            const list = document.getElementById('reviews-list');
            if (data.ratings && data.ratings.length > 0) {
                list.innerHTML =
                    '<h4 style="margin-top:1rem;margin-bottom:0.5rem;">Izohlar</h4>' +
                    data.ratings.map(r => {
                        let stars = '';
                        for (let i = 1; i <= 5; i++) stars += i <= r.rating ? '⭐' : '☆';
                        return `
              <div class="review-item">
                <div class="review-header">
                  <span class="review-name">${escapeHtml(r.full_name || 'Foydalanuvchi')}</span>
                  <span class="review-date">${r.created_at ? new Date(r.created_at).toLocaleDateString() : ''}</span>
                </div>
                <div class="review-stars">${stars}</div>
                ${r.comment ? `<div class="review-comment">${escapeHtml(r.comment)}</div>` : ''}
              </div>`;
                    }).join('');
            } else {
                list.innerHTML = '';
            }
        } catch (e) {
            // jim
        }
    }
</script>
