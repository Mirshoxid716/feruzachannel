<style>
    :root {
        --sidebar-width: 300px;

        /* Premium palette (primary/accent sizning style.css dan keladi) */
        --card-bg: rgba(255, 255, 255, .82);
        --card-solid: #ffffff;
        --stroke: rgba(255, 255, 255, .55);
        --stroke-soft: rgba(0, 0, 0, .06);

        --shadow-1: 0 10px 30px rgba(17, 24, 39, .10);
        --shadow-2: 0 20px 60px rgba(17, 24, 39, .14);

        --radius-xl: 26px;
        --radius-lg: 20px;

        --blur: 14px;
    }

    body {
        background:
            radial-gradient(900px 500px at 15% 10%, rgba(255, 205, 72, .22), transparent 60%),
            radial-gradient(900px 500px at 85% 20%, rgba(177, 125, 0, .18), transparent 60%),
            radial-gradient(900px 600px at 50% 90%, rgba(0, 0, 0, .06), transparent 60%),
            var(--bg-light);
        min-height: 100vh;
    }

    /* Header polish */
    .main-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, .75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(0, 0, 0, .06);
    }

    .main-header .logo {
        font-weight: 800;
        letter-spacing: .2px;
    }

    .nav-links a {
        position: relative;
    }

    .nav-links a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -10px;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--primary));
        transition: width .25s ease;
        border-radius: 10px;
    }

    .nav-links a:hover::after {
        width: 100%;
    }

    /* Hero */
    .profile-hero {
        padding: 120px 0 90px;
        position: relative;
        overflow: hidden;
        color: #111827;
        background:
            radial-gradient(900px 500px at 20% 30%, rgba(255, 205, 72, .55), transparent 60%),
            radial-gradient(1000px 650px at 80% 25%, rgba(177, 125, 0, .35), transparent 60%),
            linear-gradient(135deg, rgba(255, 255, 255, .75), rgba(255, 255, 255, .35));
        border-bottom: 1px solid rgba(255, 255, 255, .55);
    }

    .profile-hero::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: url('assets/wavy.svg') repeat-x;
        background-position: bottom;
        opacity: .12;
        pointer-events: none;
    }

    .profile-hero::after {
        content: "";
        position: absolute;
        width: 520px;
        height: 520px;
        right: -180px;
        top: -220px;
        background: radial-gradient(circle, rgba(255, 205, 72, .55), transparent 60%);
        filter: blur(10px);
        opacity: .9;
        pointer-events: none;
    }

    .hero-title {
        font-size: clamp(2.1rem, 3.4vw, 3.2rem);
        line-height: 1.05;
        letter-spacing: -0.8px;
        margin-bottom: 14px;
        font-weight: 900;
    }

    /* Layout grid */
    .dashboard-grid {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr;
        gap: 2rem;
        margin-top: -54px;
        position: relative;
        z-index: 10;
        padding-bottom: 30px;
    }

    /* Premium glass card base */
    .glass-card {
        background: var(--card-bg);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow-1);
        backdrop-filter: blur(var(--blur));
        -webkit-backdrop-filter: blur(var(--blur));
        border-radius: var(--radius-xl);
    }

    /* Sidebar */
    .profile-sidebar {
        padding: 2.2rem;
        height: fit-content;
        text-align: center;
        position: sticky;
        top: 92px;
    }

    .profile-sidebar.glass-card {
        box-shadow: var(--shadow-2);
    }

    .avatar-circle {
        width: 92px;
        height: 92px;
        border-radius: 26px;
        margin: 0 auto 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 900;
        color: #111827;
        background:
            linear-gradient(135deg, rgba(255, 205, 72, .85), rgba(177, 125, 0, .35));
        border: 1px solid rgba(255, 255, 255, .75);
        box-shadow: 0 14px 30px rgba(177, 125, 0, .18);
    }

    .user-name {
        font-size: 1.25rem;
        font-weight: 900;
        margin-bottom: 0.25rem;
        color: #0f172a;
    }

    .user-email {
        color: rgba(15, 23, 42, .62);
        font-size: 0.92rem;
        margin-bottom: 1.4rem;
    }

    .sidebar-menu {
        list-style: none;
        text-align: left;
        margin-top: 1.1rem;
        padding: 0;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        gap: .9rem;
        padding: .9rem 1rem;
        text-decoration: none;
        color: #0f172a;
        font-weight: 700;
        border-radius: 16px;
        transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
        background: rgba(255, 255, 255, .55);
        border: 1px solid rgba(0, 0, 0, .04);
    }

    .sidebar-menu a:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, .85);
        box-shadow: 0 10px 20px rgba(17, 24, 39, .08);
    }

    .sidebar-menu a.active {
        background: linear-gradient(135deg, rgba(255, 205, 72, .35), rgba(177, 125, 0, .10));
        border: 1px solid rgba(177, 125, 0, .18);
        color: #0f172a;
    }

    /* Main */
    .profile-main {
        display: flex;
        flex-direction: column;
        gap: 1.6rem;
        min-width: 0;
    }

    .content-card {
        padding: 2.2rem;
        border-radius: var(--radius-xl);
        background: var(--card-solid);
        border: 1px solid var(--stroke-soft);
        box-shadow: var(--shadow-1);
    }

    .welcome-card {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(177, 125, 0, .12);
        background:
            radial-gradient(700px 300px at 15% 20%, rgba(255, 205, 72, .28), transparent 60%),
            radial-gradient(700px 350px at 80% 10%, rgba(177, 125, 0, .16), transparent 60%),
            #fff;
    }

    .welcome-card::after {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(90deg, rgba(255, 205, 72, .28), transparent, rgba(177, 125, 0, .12));
        opacity: .35;
        pointer-events: none;
        transform: translateX(-30%);
    }

    /* Stats */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.1rem;
    }

    .stat-card {
        padding: 1.3rem 1.35rem;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(0, 0, 0, .06);
        background:
            linear-gradient(180deg, rgba(255, 255, 255, .95), rgba(255, 255, 255, .75));
        box-shadow: 0 10px 22px rgba(17, 24, 39, .08);
        transition: transform .18s ease, box-shadow .18s ease;
    }

    .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 40px rgba(17, 24, 39, .12);
    }

    .stat-value {
        font-size: 1.65rem;
        font-weight: 900;
        letter-spacing: -0.4px;
        color: var(--primary);
    }

    .stat-label {
        font-weight: 700;
        color: rgba(15, 23, 42, .62);
        font-size: .92rem;
    }

    /* CTA button polish */
    .btn.btn-primary {
        border-radius: 999px;
        padding: 0.95rem 1.35rem;
        box-shadow: 0 16px 34px rgba(177, 125, 0, .18);
        transform: translateZ(0);
    }

    .btn.btn-primary:hover {
        transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 992px) {
        .dashboard-grid {
            grid-template-columns: 1fr;
        }

        .profile-sidebar {
            position: relative;
            top: 0;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-align: left;
            padding: 1.4rem;
        }

        .avatar-circle {
            margin: 0;
            width: 76px;
            height: 76px;
            border-radius: 20px;
        }

        .sidebar-menu {
            display: none;
        }
    }
</style>
