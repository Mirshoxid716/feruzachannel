<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile_title">Shaxsiy Kabinet - Feruza Channel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 300px;
            --card-bg: rgba(255, 255, 255, .82);
            --card-solid: #ffffff;
            --stroke: rgba(255, 255, 255, .55);
            --stroke-soft: rgba(0, 0, 0, .06);
            --shadow-1: 0 10px 30px rgba(17, 24, 39, .10);
            --shadow-2: 0 20px 60px rgba(17, 24, 39, .14);
            --radius-xl: 26px;
            --radius-lg: 20px;
            --blur: 14px;
        }

        body {
            background:
                radial-gradient(900px 500px at 15% 10%, rgba(255, 205, 72, .22), transparent 60%),
                radial-gradient(900px 500px at 85% 20%, rgba(177, 125, 0, .18), transparent 60%),
                var(--bg-light);
            min-height: 100vh;
        }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, .06);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            gap: 2rem;
            margin-top: 40px;
            padding-bottom: 30px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow-1);
            backdrop-filter: blur(var(--blur));
            border-radius: var(--radius-xl);
            padding: 2rem;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 0 auto 1rem;
        }

        .sidebar-menu {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-menu a {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s;
        }

        .sidebar-menu a.active {
            background: var(--primary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--stroke-soft);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <header class="main-header">
        <nav class="container"
            style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
            <div class="logo">Feruza <span class="accent">Channel</span></div>
            <ul class="nav-links" style="display: flex; gap: 2rem; list-style: none;">
                <li><a href="index.html" data-i18n="nav_home">Bosh sahifa</a></li>
                <li><a href="courses.html" data-i18n="nav_courses">Kurslar</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">Aloqa</a></li>
            </ul>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="lang-selector">
                    <button class="lang-btn" onclick="toggleLangDropdown()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                            </path>
                        </svg>
                        <span id="current-lang">UZ</span>
                    </button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <div class="lang-option" data-lang="uz" onclick="changeLanguage('uz')">O'zbekcha (UZ)</div>
                        <div class="lang-option" data-lang="ja" onclick="changeLanguage('ja')">日本語 (JA)</div>
                    </div>
                </div>
                <a href="#" onclick="handleLogout()" class="btn btn-nav" data-i18n="logout">Chiqish</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="dashboard-grid">
            <aside class="glass-card">
                <div class="avatar-circle" id="user-avatar">U</div>
                <h3 id="user-name" style="text-align: center; margin-bottom: 0.5rem;">Foydalanuvchi</h3>
                <p id="user-email" style="text-align: center; font-size: 0.9rem; color: #666;">email@example.com</p>

                <nav class="sidebar-menu">
                    <a href="profile.html" class="active" data-i18n="profile_menu_info">Profil ma'lumotlari</a>
                    <a href="courses.html" data-i18n="profile_menu_courses">Mening kurslarim</a>
                </nav>
            </aside>

            <section class="content-area">
                <div class="glass-card">
                    <h2 data-i18n="profile_welcome">Xush kelibsiz!</h2>
                    <p data-i18n="profile_summary_subtitle">Platformamizda faol bo'ling va natijalarga erishing!</p>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="courses-count">0</div>
                            <div class="stat-label" data-i18n="profile_stat_courses">Kurslar soni</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="completed-count">0</div>
                            <div class="stat-label" data-i18n="profile_stat_completed">Tugatilgan darslar</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Load user data on init
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
        });

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
