<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - Feruza Channel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-card {
            background: var(--white);
            padding: 3.5rem 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-strong);
            width: 100%;
            max-width: 480px;
            z-index: 10;
            position: relative;
        }

        .auth-card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.2rem;
        }

        .form-control {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid #F0F0FF;
            border-radius: 16px;
            background: #F8F9FD;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(177, 125, 0, 0.1);
        }

        .logo-login {
            position: absolute;
            top: 4rem;
            left: 4rem;
            color: var(--white);
            z-index: 10;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .auth-bg-text {
            position: absolute;
            left: 4rem;
            top: 30%;
            max-width: 500px;
            color: var(--white);
            z-index: 5;
        }

        .auth-bg-text h1 {
            font-size: 5rem;
            line-height: 1;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 992px) {

            .auth-bg-text,
            .logo-login {
                display: none;
            }

            .auth-card {
                margin: 2rem;
            }
        }
    </style>
</head>

<body class="bg-auth">
    <div
        style="position: absolute; top: 4rem; right: 4rem; z-index: 100; display: flex; align-items: center; gap: 1rem;">
        <div class="lang-selector">
            <button class="lang-btn" onclick="toggleLangDropdown()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                <span id="current-lang">UZ</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
                <div class="lang-option" data-lang="uz" onclick="changeLanguage('uz')">O'zbekcha (UZ)</div>
                <div class="lang-option" data-lang="ja" onclick="changeLanguage('ja')">日本語 (JA)</div>
            </div>
        </div>
        <a href="index.html" class="logo-login" style="position: static;">Feruza <span
                style="color:var(--primary);">Channel</span></a>
    </div>

    <div class="auth-bg-text animate">
        <h1>Creative.</h1>
        <p style="font-size: 1.2rem; opacity: 0.9;">Yapon tilini zamonaviy va ijodiy usulda o'rganing. Bizning platforma
            orqali orzularingizga yetishish osonroq.</p>
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <a href="index.html" class="btn"
                style="background: rgba(255,255,255,0.2); color:white; border: 1px solid white;">Batafsil</a>
        </div>
    </div>

    <div class="auth-card animate" style="animation-delay: 0.2s;">
        <h2 data-i18n="login_title">Xush kelibsiz! 👋</h2>
        <p data-i18n="login_subtitle">Iltimos, hisobingizga kiring</p>

        <form id="login-form">
            <div class="form-group">
                <label><span data-i18n="username">👤 Foydalanuvchi nomi yoki Email</span></label>
                <input type="text" id="login-email" class="form-control" placeholder="Ismingiz yoki email" required
                    data-i18n="username">
            </div>
            <div class="form-group">
                <label><span data-i18n="password">🔒 Parol</span></label>
                <input type="password" id="login-password" class="form-control" placeholder="Parolingizni kiriting"
                    required data-i18n="password">
            </div>

            <button type="submit" class="btn btn-primary btn-block"
                style="padding: 1.2rem; margin-top: 2rem; border-radius: 16px;" data-i18n="login_btn">TIZIMGA
                KIRISH</button>
            <div id="login-error" style="color: #ff4757; margin-top: 1.5rem; text-align: center; font-weight: 600;">
            </div>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Hisobingiz yo'qmi? <a href="register.html"
                style="color: var(--primary); font-weight: 700; text-decoration: none;">Ro'yxatdan o'tish</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', handleLogin);
    </script>
</body>

</html>
